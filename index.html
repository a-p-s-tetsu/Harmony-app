<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony — 録音解析 &amp; 同期再生</title>
    <link rel="stylesheet" href="style.css" />
    <!-- CREPE 推論は ml5 に同梱の TensorFlow.js（ml5.tf）を使用（重複読み込みを避けるため tf は別途読み込まない） -->
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <script src="crepe-pitch.js"></script>
  </head>
  <body>
    <main class="panel">
      <h1>録音 → 解析 → ハモリ再生</h1>
      <p class="hint">
        HTTPS または <code>localhost</code> で開き、「Mic/Record」で録音します。停止後に録音データを CREPE でオフライン解析し、音符列を抽出します。「Play
        Recorded」で原音とハモリを同期再生、「ハモリのみ再生」では原音をミュートしてハモリだけ聞けます（いずれも内部では同じタイムラインで再生します）。
      </p>
      <div class="song-preset" role="group" aria-label="楽曲プリセット">
        <label class="song-preset__label" for="songPreset">楽曲</label>
        <select id="songPreset" class="song-preset__select">
          <option value="custom" selected>カスタム（自分で設定する）</option>
          <option value="cherry">スピッツ - チェリー (サビ)</option>
          <option value="parallel_5th">（おまけ）どんな曲でも合う 5度上</option>
        </select>
        <div id="currentSettings" class="current-settings" aria-live="polite"></div>
      </div>
      <div class="controls" role="group" aria-label="マイク・録音・再生">
        <button type="button" id="micRecordBtn" class="btn">Mic/Record</button>
        <button type="button" id="stopRecordBtn" class="btn btn--secondary" disabled>
          Stop Recording
        </button>
        <button type="button" id="playRecordedBtn" class="btn btn--secondary" disabled>
          Play Recorded
        </button>
        <button type="button" id="playHarmonyOnlyBtn" class="btn btn--secondary" disabled>
          ハモリのみ再生
        </button>
        <div class="harmony-interval">
          <label class="harmony-interval__label" for="harmonyInterval">ハモリの間隔</label>
          <select id="harmonyInterval" class="harmony-interval__select">
            <option value="7" selected>完全5度上 (+7半音)</option>
            <option value="-5">完全4度下 (-5半音)</option>
            <option value="4">長3度上 (+4半音)</option>
            <option value="3">短3度上 (+3半音)</option>
            <option value="-12">1オクターブ下 (-12半音)</option>
          </select>
        </div>
      </div>
      <audio id="recordedAudio" controls style="display: none;"></audio>
      <p id="status" class="status" aria-live="polite">Ready</p>
      <section class="readouts" aria-label="検出結果">
        <div class="readout">
          <span class="label">Frequency</span>
          <span id="hz" class="value">—</span>
          <span class="unit">Hz</span>
        </div>
        <div class="readout">
          <span class="label">Note</span>
          <span id="note" class="value note">—</span>
        </div>
        <div class="readout">
          <span class="label">Harmony</span>
          <span id="harmonyHz" class="value">—</span>
          <span class="unit">Hz</span>
          <span id="harmonyNote" class="value note note--harmony">—</span>
        </div>
        <div class="readout readout--subtle">
          <span class="label">抽出ノート数</span>
          <span id="confidence" class="value value--sm">—</span>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
